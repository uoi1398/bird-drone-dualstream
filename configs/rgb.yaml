experiment_name: rgb_seed42

seed: 42

data:
  manifest_path: data/splits/manifest.csv
  mode: rgb
  num_classes: 2
  class_names: ["bird", "drone"]

model:
  name: resnet18_temporal_average
  pretrained: true
  num_frames: 16
  image_size: 224

train:
  batch_size: 4
  epochs: 10
  optimizer: AdamW
  learning_rate: 0.0001
  weight_decay: 0.0001
  loss: CrossEntropyLoss
  save_metric: val_f1

output:
  run_dir: runs/20260515_rgb_seed42
  best_model_path: runs/20260515_rgb_seed42/rgb_best.pth